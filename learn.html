.body{display:none;padding:0 14px 14px 14px;border-top:1px dashed var(--line);}.ch.open .body{display:block;}

.lbl{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.5px;margin:12px 0 6px;}

function render(){
  document.getElementById('chapters').innerHTML=CH.map((c,i)=>{
    const terms=c.terms.map(t=>'<div class="term"><span class="ja">'+t[0]+'</span> · <span class="zh">'+t[1]+'</span> · <span class="en">'+t[2]+'</span></div>').join('');
    return '<div class="ch" id="ch'+i+'"><div class="ch-h" onclick="tog('+i+')">'+
      '<div class="num">第'+c.n+'章</div><div class="ch-t"><div class="zh">'+c.zh+'</div><div class="ja">'+c.ja+'</div></div><div class="caret">▶</div></div>'+
      '<div class="body"><div class="lead">'+c.lead+'</div><div class="lbl">核心术语</div>'+terms+'</div></div>';
  }).join('');
}
function tog(i){document.getElementById('ch'+i).classList.toggle('open');}
function setAll(o){document.querySelectorAll('.ch').forEach(e=>e.classList.toggle('open',o));}
let furi=true;try{furi=localStorage.getItem('bjt_set')?JSON.parse(localStorage.getItem('bjt_set')).furi!==false:true;}catch(e){}
function applyFuri(){document.body.classList.toggle('hide-furi',!furi);document.getElementById('furiSwitch').classList.toggle('on',furi);}
function toggleFuri(){furi=!furi;try{localStorage.setItem('bjt_set',JSON.stringify({furi:furi}));}catch(e){}applyFuri();}
render();applyFuri();
